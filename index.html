<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }
        .win-border { border: 1px solid var(--border-color, #3e3e3e); }
        .win-btn { background: var(--btn-bg, #2b2b2b); border: 1px solid var(--border-color, #3e3e3e); color: var(--text-color) !important; transition: all 0.2s; }
        .win-btn:hover { background: var(--btn-hover, #353535); border-color: var(--accent-color, #0078d4); }
        .win-input { background: var(--input-bg, #1e1e1e); border: 1px solid var(--border-color, #3e3e3e); border-bottom: 2px solid var(--border-color, #3e3e3e); transition: border-color 0.2s; color: var(--input-text-color) !important; }
        .win-input:focus { border-bottom-color: var(--accent-color, #0078d4); outline: none; }
        
        .wallpaper-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://jkqayyoyrzmrscqjkeqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcWF5eW95cnptcnNjcWprZXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTE3MjYsImV4cCI6MjA5MzE4NzcyNn0.IEsgMQsD5Sq4heWsmafHowKLh1KfXU___DcPBDATv38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const THEMES = {
            'ov-dark': { name: 'OpenVault Dark', bg: '#0c0c0c', panel: '#121212', text: '#cccccc', title: '#ffffff', border: '#3e3e3e', btn: '#2b2b2b', hover: '#353535', input: '#1e1e1e', accent: '#0078d4', inputTxt: '#ffffff' },
            'ov-light': { name: 'OpenVault Light', bg: '#f3f3f3', panel: '#ffffff', text: '#444444', title: '#111111', border: '#cccccc', btn: '#e1e1e1', hover: '#d5d5d5', input: '#f9f9f9', accent: '#0078d4', inputTxt: '#111111' },
            'ct-latte': { name: 'Catppuccin Latte', bg: '#eff1f5', panel: '#e6e9ef', text: '#4c4f69', title: '#d20f39', border: '#ccd0da', btn: '#ccd0da', hover: '#bcc0cc', input: '#ffffff', accent: '#1e66f5', inputTxt: '#4c4f69' },
            'ct-frappe': { name: 'Catppuccin Frappé', bg: '#303446', panel: '#292c3c', text: '#c6d0f5', title: '#e5c890', border: '#414559', btn: '#414559', hover: '#51576d', input: '#232634', accent: '#8caaee', inputTxt: '#c6d0f5' },
            'ct-macchiato': { name: 'Catppuccin Macchiato', bg: '#24273a', panel: '#1e2030', text: '#cad3f5', title: '#eed49f', border: '#36394e', btn: '#36394e', hover: '#494d64', input: '#181926', accent: '#8aadf4', inputTxt: '#cad3f5' },
            'ct-mocha': { name: 'Catppuccin Mocha', bg: '#1e1e2e', panel: '#181825', text: '#cdd6f4', title: '#f9e2af', border: '#313244', btn: '#313244', hover: '#45475a', input: '#11111b', accent: '#89b4fa', inputTxt: '#cdd6f4' }
        };

        const SPOTLIGHT_WALLPAPERS = [
            { name: 'None (Solid Color)', url: '' },
            { name: 'Aurora Sky', url: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?q=80&w=1200' },
            { name: 'Cyber Neon Grid', url: 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=1200' },
            { name: 'Minimalist Mountain', url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1200' },
            { name: 'Abstract Geometric', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200' }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [vault, setVault] = useState(null);
            const [files, setFiles] = useState([]);
            const [form, setForm] = useState({ name: '', pass: '' });
            const [showSettings, setShowSettings] = useState(false);
            
            // supabase server tracking state
            const [dbStatus, setDbStatus] = useState('checking'); // 'online' | 'offline' | 'checking'
            
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('openvault_settings');
                return saved ? JSON.parse(saved) : { 
                    theme: 'ov-dark', alias: '', useAlias: false,
                    wallpaperType: 'spotlight', spotlightIndex: 0, customWallpaperUrl: '',
                    brightness: 100
                };
            });

            const currentTheme = THEMES[settings.theme] || THEMES['ov-dark'];

            // ping supabase node to check cluster health
            const checkSupabaseHealth = async () => {
                try {
                    // human note: run a lightweight limit-1 request to verify table status
                    const { error } = await supabaseClient.from('folders').select('folder_hash').limit(1);
                    if (error) throw error;
                    setDbStatus('online');
                } catch (err) {
                    setDbStatus('offline');
                }
            };

            useEffect(() => {
                checkSupabaseHealth();
                // re-verify connection every 15 seconds
                const interval = setInterval(checkSupabaseHealth, 15000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--border-color', currentTheme.border);
                root.style.setProperty('--btn-bg', currentTheme.btn);
                root.style.setProperty('--btn-hover', currentTheme.hover);
                root.style.setProperty('--input-bg', currentTheme.input);
                root.style.setProperty('--accent-color', currentTheme.accent);
                root.style.setProperty('--text-color', currentTheme.text);
                root.style.setProperty('--input-text-color', currentTheme.inputTxt);
                lucide.createIcons();
            }, [settings.theme, view, showSettings, files, dbStatus]);

            const updateSetting = (key, value) => {
                const updated = { ...settings, [key]: value };
                setSettings(updated);
                localStorage.setItem('openvault_settings', JSON.stringify(updated));
            };

            const handleCustomWallpaperUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const updated = { ...settings, wallpaperType: 'custom', customWallpaperUrl: reader.result };
                    setSettings(updated);
                    localStorage.setItem('openvault_settings', JSON.stringify(updated));
                };
                reader.readAsDataURL(file);
            };

            const getFileIcon = (fileName) => {
                const ext = fileName.split('.').pop().toLowerCase();
                if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) return 'image';
                if (['mp3', 'wav', 'ogg', 'flac', 'm4a'].includes(ext)) return 'music';
                if (['mp4', 'mkv', 'avi', 'mov', 'webm'].includes(ext)) return 'video';
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return 'folder-archive';
                if (['txt', 'md', 'json', 'html', 'css', 'js', 'lua'].includes(ext)) return 'file-code';
                if (['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'].includes(ext)) return 'file-text';
                return 'file';
            };

            const getHash = async (text) => {
                const msgUint8 = new TextEncoder().encode(text.toLowerCase().trim());
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            };

            const refreshFiles = async (id) => {
                if (dbStatus !== 'online') return;
                const { data } = await supabaseClient.storage.from('vaults').list(id);
                setFiles(data || []);
            };

            const handleEntry = async (e, mode) => {
                e.preventDefault();
                if (dbStatus !== 'online') {
                    alert("Cannot establish vault session. Supabase cluster is unreachable.");
                    return;
                }
                setLoading(true);
                const id = await getHash(form.name);
                const pHash = await getHash(form.pass);

                if (mode === 'create') {
                    const { error } = await supabaseClient.from('folders').insert([{ folder_hash: id, display_name: form.name, password_hash: pHash }]);
                    if (error) { alert("Vault name taken or error occurred."); setLoading(false); return; }
                } else {
                    const { data } = await supabaseClient.from('folders').select('*').eq('folder_hash', id).maybeSingle();
                    if (!data || data.password_hash !== pHash) { alert("Incorrect vault name or password."); setLoading(false); return; }
                }
                setVault({ id, name: form.name });
                refreshFiles(id);
                setView('inside');
                setLoading(false);
            };

            const uploadFile = async (e) => {
                if (dbStatus !== 'online') return;
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                await supabaseClient.storage.from('vaults').upload(`${vault.id}/${file.name}`, file);
                await refreshFiles(vault.id);
                setLoading(false);
            };

            const deleteFile = async (fileName) => {
                if (dbStatus !== 'online') return;
                if (!confirm(`Delete "${fileName}"?`)) return;
                setLoading(true);
                await supabaseClient.storage.from('vaults').remove([`${vault.id}/${fileName}`]);
                await refreshFiles(vault.id);
                setLoading(false);
            };

            const deleteVault = async () => {
                if (dbStatus !== 'online') return;
                const check = prompt(`To delete this vault, type the vault name ("${vault.name}") below:`);
                if (check !== vault.name) return;

                setLoading(true);
                await supabaseClient.from('folders').delete().eq('folder_hash', vault.id);
                if (files.length > 0) {
                    const paths = files.map(f => `${vault.id}/${f.name}`);
                    await supabaseClient.storage.from('vaults').remove(paths);
                }
                window.location.reload();
            };

            const wallpaperUrl = settings.wallpaperType === 'custom' 
                ? settings.customWallpaperUrl 
                : (SPOTLIGHT_WALLPAPERS[settings.spotlightIndex]?.url || '');

            return (
                <div className="min-h-screen relative flex flex-col items-center justify-center p-6" style={{ color: currentTheme.text }}>
                    
                    <div className="wallpaper-bg" style={{ 
                        backgroundImage: wallpaperUrl ? `url(${wallpaperUrl})` : 'none',
                        backgroundColor: currentTheme.bg,
                        filter: `brightness(${settings.brightness}%)`
                    }}></div>

                    {view === 'inside' ? (
                        <div className="w-full max-w-4xl my-auto">
                            <header className="win-border p-6 mb-8 flex justify-between items-center" style={{ backgroundColor: currentTheme.panel }}>
                                <div>
                                    <div className="flex items-center gap-3">
                                        <h2 className="font-bold text-xl" style={{ color: currentTheme.title }}>{vault.name}</h2>
                                        
                                        {/* database engine network status layout indicator badge */}
                                        <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-sm select-none transition-all ${
                                            dbStatus === 'online' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 
                                            dbStatus === 'offline' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 
                                            'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                                        }`}>
                                            <span className={`w-1.5 h-1.5 rounded-full ${
                                                dbStatus === 'online' ? 'bg-green-400 animate-pulse' : 
                                                dbStatus === 'offline' ? 'bg-red-400' : 'bg-yellow-400 animate-spin'
                                            }`}></span>
                                            Supabase: {dbStatus}
                                        </span>
                                    </div>
                                    <p className="text-[10px] opacity-50 uppercase tracking-widest mt-1" style={{ color: currentTheme.text }}>
                                        {dbStatus === 'online' ? 'Database Cluster Operational' : 'Database Cluster Error / Disconnected'}
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <label className={`win-btn px-4 py-2 text-xs font-bold flex items-center gap-2 ${dbStatus !== 'online' ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'}`}>
                                        <i data-lucide="upload" size="14"></i> Upload
                                        <input type="file" className="hidden" onChange={uploadFile} disabled={dbStatus !== 'online'} />
                                    </label>
                                    <button onClick={() => setShowSettings(true)} className="win-btn px-3 py-2"><i data-lucide="settings" size="14"></i></button>
                                    <button onClick={deleteVault} disabled={dbStatus !== 'online'} className={`win-btn px-4 py-2 text-xs font-bold text-red-400 hover:border-red-500 ${dbStatus !== 'online' ? 'opacity-40 cursor-not-allowed' : ''}`}>Delete Vault</button>
                                    <button onClick={() => window.location.reload()} className="win-btn px-4 py-2 text-xs font-bold">Log Out</button>
                                </div>
                            </header>

                            {dbStatus === 'offline' && (
                                <div className="win-border p-3 mb-4 text-xs font-bold bg-red-500/10 border-red-500/30 text-red-400 text-center flex items-center justify-center gap-2">
                                    <i data-lucide="database-zap" size="14"></i> Supabase backend lost connection. Cloud write/delete actions are locked down.
                                </div>
                            )}

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {files.map(f => (
                                    <div key={f.name} className="win-border p-4 flex items-center justify-between group" style={{ backgroundColor: currentTheme.panel }}>
                                        <div className="flex items-center gap-3 overflow-hidden">
                                            <i data-lucide={getFileIcon(f.name)} size="18" style={{color: currentTheme.accent}} className="shrink-0"></i>
                                            <span className="text-sm truncate" style={{ color: currentTheme.title }}>{f.name}</span>
                                        </div>
                                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity" style={{ color: currentTheme.text }}>
                                            {dbStatus === 'online' ? (
                                                <a href={`${SUPABASE_URL}/storage/v1/object/public/vaults/${vault.id}/${f.name}`} download className="p-1 hover:opacity-80">
                                                    <i data-lucide="download" size="18"></i>
                                                </a>
                                            ) : (
                                                <span className="p-1 opacity-20 cursor-not-allowed" title="Offline"><i data-lucide="download" size="18"></i></span>
                                            )}
                                            <button onClick={() => deleteFile(f.name)} disabled={dbStatus !== 'online'} className={`p-1 ${dbStatus === 'online' ? 'hover:text-red-500' : 'opacity-20 cursor-not-allowed'}`}>
                                                <i data-lucide="trash-2" size="18"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="my-auto flex flex-col items-center">
                            {settings.useAlias && settings.alias.trim() && (
                                <div className="mb-4 text-sm font-bold opacity-80 tracking-wide text-center uppercase" style={{ color: currentTheme.accent }}>
                                    Welcome back, {settings.alias}
                                </div>
                            )}

                            <div className="win-border p-10 w-full max-w-sm relative" style={{ backgroundColor: currentTheme.panel }}>
                                
                                {/* landing gate level database checker chip badge */}
                                <div className="absolute top-3 right-3 flex items-center gap-1 px-1.5 py-0.5 rounded-sm text-[8px] font-bold uppercase tracking-wider border select-none transition-all"
                                     style={{ 
                                         borderColor: dbStatus === 'online' ? 'rgba(34,197,94,0.2)' : dbStatus === 'offline' ? 'rgba(239,68,68,0.2)' : 'rgba(234,179,8,0.2)',
                                         color: dbStatus === 'online' ? '#4ade80' : dbStatus === 'offline' ? '#f87171' : '#facc15',
                                         backgroundColor: dbStatus === 'online' ? 'rgba(34,197,94,0.05)' : dbStatus === 'offline' ? 'rgba(239,68,68,0.05)' : 'rgba(234,179,8,0.05)'
                                     }}>
                                    <span className={`w-1 h-1 rounded-full ${dbStatus === 'online' ? 'bg-green-400' : dbStatus === 'offline' ? 'bg-red-400' : 'bg-yellow-400 animate-spin'}`}></span>
                                    DB: {dbStatus}
                                </div>

                                <div className="flex justify-between items-center mb-10">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 flex items-center justify-center" style={{backgroundColor: currentTheme.accent}}>
                                            <i data-lucide="lock" className="text-white" size="20"></i>
                                        </div>
                                        <h1 className="text-2xl font-bold tracking-tight" style={{ color: currentTheme.title }}>OpenVault</h1>
                                    </div>
                                    <button onClick={() => setShowSettings(true)} className="opacity-60 hover:opacity-100 transition-opacity" style={{ color: currentTheme.text }}>
                                        <i data-lucide="settings" size="20"></i>
                                    </button>
                                </div>

                                {view === 'home' ? (
                                    <div className="space-y-4">
                                        <button onClick={() => setView('login')} className="win-btn w-full p-4 text-sm font-bold">Log In</button>
                                        <button onClick={() => setView('setup')} disabled={dbStatus !== 'online'} className={`win-btn w-full p-4 text-sm opacity-60 ${dbStatus !== 'online' ? 'cursor-not-allowed opacity-30' : ''}`}>Create New Vault</button>
                                    </div>
                                ) : (
                                    <form onSubmit={(e) => handleEntry(e, view === 'setup' ? 'create' : 'login')} className="space-y-5">
                                        <div>
                                            <label className="text-[10px] uppercase opacity-50 block mb-1" style={{ color: currentTheme.text }}>Vault Name</label>
                                            <input className="win-input w-full p-3 text-sm" placeholder="Enter name" onChange={e => setForm({...form, name: e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase opacity-50 block mb-1" style={{ color: currentTheme.text }}>Password</label>
                                            <input type="password" className="win-input w-full p-3 text-sm" placeholder="••••••••" onChange={e => setForm({...form, pass: e.target.value})} required />
                                        </div>
                                        <button type="submit" disabled={dbStatus !== 'online'} className={`win-btn w-full p-4 text-sm text-white border-none font-bold ${dbStatus !== 'online' ? 'opacity-40 cursor-not-allowed' : ''}`} style={{backgroundColor: currentTheme.accent}}>
                                            {loading ? 'Working...' : (view === 'setup' ? 'Create' : 'Log In')}
                                        </button>
                                        <button type="button" onClick={() => setView('home')} className="w-full text-[10px] uppercase opacity-40 hover:opacity-100 transition-opacity text-center block mt-2" style={{ color: currentTheme.text }}>Go Back</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                            <div className="win-border p-6 w-full max-w-md max-h-[85vh] overflow-y-auto" style={{ backgroundColor: currentTheme.panel, color: currentTheme.text }}>
                                <div className="flex justify-between items-center mb-6 border-b pb-2" style={{borderColor: currentTheme.border}}>
                                    <h2 className="font-bold text-lg" style={{ color: currentTheme.title }}>Personalization Settings</h2>
                                    <button onClick={() => setShowSettings(false)} style={{ color: currentTheme.text }}><i data-lucide="x" size="18"></i></button>
                                </div>

                                <div className="space-y-6 text-sm">
                                    <div>
                                        <label className="block text-[10px] uppercase opacity-50 mb-2 font-bold tracking-wider" style={{ color: currentTheme.text }}>User Account Profile</label>
                                        <div className="flex items-center gap-2 mb-2">
                                            <input type="checkbox" id="useAlias" checked={settings.useAlias} onChange={(e) => updateSetting('useAlias', e.target.checked)} className="h-4 w-4" />
                                            <label htmlFor="useAlias" className="text-xs select-none" style={{ color: currentTheme.title }}>Enable System Greeting Banner</label>
                                        </div>
                                        <input className="win-input w-full p-2 text-xs" placeholder="e.g. BlackPC" value={settings.alias} onChange={(e) => updateSetting('alias', e.target.value)} disabled={!settings.useAlias} />
                                    </div>

                                    <div>
                                        <label className="block text-[10px] uppercase opacity-50 mb-2 font-bold tracking-wider" style={{ color: currentTheme.text }}>Interface Theme Base</label>
                                        <div className="grid grid-cols-2 gap-1.5">
                                            {Object.keys(THEMES).map(key => (
                                                <button key={key} onClick={() => updateSetting('theme', key)} 
                                                    className={`p-2.5 text-left border text-xs flex justify-between items-center transition-all ${settings.theme === key ? 'border-blue-500 bg-blue-500/10 font-bold' : 'border-transparent bg-black/5 hover:bg-black/10'}`}
                                                    style={{ color: currentTheme.title }}>
                                                    <span className="truncate">{THEMES[key].name}</span>
                                                    {settings.theme === key && <i data-lucide="check" size="12" className="shrink-0 ml-1"></i>}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="border-t pt-4" style={{borderColor: currentTheme.border}}>
                                        <label className="block text-[10px] uppercase opacity-50 mb-2 font-bold tracking-wider" style={{ color: currentTheme.text }}>Desktop Wallpaper Background</label>
                                        
                                        <div className="space-y-3">
                                            <div>
                                                <label className="block text-[11px] opacity-60 mb-1" style={{ color: currentTheme.text }}>Select Spotlight Scene</label>
                                                <select value={settings.wallpaperType === 'spotlight' ? settings.spotlightIndex : 'custom'} 
                                                    onChange={(e) => {
                                                        if (e.target.value === 'custom') {
                                                            updateSetting('wallpaperType', 'custom');
                                                        } else {
                                                            const updated = { ...settings, wallpaperType: 'spotlight', spotlightIndex: parseInt(e.target.value) };
                                                            setSettings(updated);
                                                            localStorage.setItem('openvault_settings', JSON.stringify(updated));
                                                        }
                                                    }}
                                                    className="w-full p-2 text-xs win-input outline-none text-black">
                                                    {SPOTLIGHT_WALLPAPERS.map((wall, idx) => (
                                                        <option key={idx} value={idx}>{wall.name}</option>
                                                    ))}
                                                    {settings.customWallpaperUrl && <option value="custom">My Uploaded Wallpaper</option>}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="win-btn px-3 py-2 text-xs font-bold cursor-pointer inline-flex items-center gap-2">
                                                    <i data-lucide="image" size="14"></i> Upload Custom Image
                                                    <input type="file" accept="image/*" className="hidden" onChange={handleCustomWallpaperUpload} />
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="border-t pt-4 space-y-4" style={{borderColor: currentTheme.border}}>
                                        <div>
                                            <div className="flex justify-between text-xs mb-1">
                                                <label className="opacity-60" style={{ color: currentTheme.text }}>Wallpaper Brightness</label>
                                                <span style={{ color: currentTheme.title }}>{settings.brightness}%</span>
                                            </div>
                                            <input type="range" min="20" max="100" value={settings.brightness} onChange={(e) => updateSetting('brightness', parseInt(e.target.value))} className="w-full accent-blue-500 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>

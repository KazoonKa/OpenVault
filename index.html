<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVault | Squared Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #ffde03; margin: 0; }
        .neubrutal-shadow { box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); }
        .btn-active:active { transform: translate(4px, 4px); box-shadow: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // human note: i put your url here already. just add the anon key!
        const SUPABASE_URL = 'https://jkqayyoyrzmrscqjkeqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcWF5eW95cnptcnNjcWprZXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTE3MjYsImV4cCI6MjA5MzE4NzcyNn0.IEsgMQsD5Sq4heWsmafHowKLh1KfXU___DcPBDATv38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BOX = "bg-white border-[4px] border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]";
        const BTN = "w-full border-[4px] border-black p-4 font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] btn-active mb-2 transition-all";

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [vault, setVault] = useState(null);
            const [files, setFiles] = useState([]);
            const [form, setForm] = useState({ name: '', pass: '' });

            const getHash = async (text) => {
                const msgUint8 = new TextEncoder().encode(text.toLowerCase().trim());
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            };

            const handleEntry = async (e, mode) => {
                e.preventDefault();
                setLoading(true);
                const id = await getHash(form.name);
                const pHash = await getHash(form.pass);

                if (mode === 'create') {
                    await supabaseClient.from('folders').insert([{ folder_hash: id, display_name: form.name, password_hash: pHash }]);
                } else {
                    const { data } = await supabaseClient.from('folders').select('*').eq('folder_hash', id).maybeSingle();
                    if (!data || data.password_hash !== pHash) {
                        alert("access denied.");
                        setLoading(false);
                        return;
                    }
                }
                setVault({ id, name: form.name });
                const { data: fileList } = await supabaseClient.storage.from('vaults').list(id);
                setFiles(fileList || []);
                setView('inside');
                setLoading(false);
            };

            if (view === 'inside') return (
                <div className="p-8 max-w-4xl mx-auto">
                    <div className={`${BOX} p-6 mb-8 flex justify-between items-center`}>
                        <h2 className="font-black uppercase italic">{vault.name}</h2>
                        <button onClick={() => window.location.reload()} className="text-xs font-bold underline">EXIT</button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        {files.length > 0 ? files.map(f => (
                            <div key={f.name} className={`${BOX} p-4 flex justify-between items-center`}>
                                <span className="font-bold truncate text-sm uppercase">{f.name}</span>
                                <a href={`${SUPABASE_URL}/storage/v1/object/public/vaults/${vault.id}/${f.name}`} target="_blank" className="bg-black text-white p-2 border-2 border-black">
                                    <i data-lucide="download"></i>
                                </a>
                            </div>
                        )) : <p className="font-bold italic opacity-50">Vault is empty...</p>}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className={`${BOX} p-10 w-full max-w-md text-center`}>
                        <div className="border-[4px] border-black inline-block p-4 mb-4 bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                            <i data-lucide="shield" size="48"></i>
                        </div>
                        <h1 className="text-4xl font-[1000] uppercase italic tracking-tighter mb-8">OpenVault</h1>
                        {view === 'home' ? (
                            <div className="flex flex-col gap-2">
                                <button onClick={() => setView('login')} className={`${BTN} bg-[#2563eb] text-white`}>Unlock</button>
                                <button onClick={() => setView('setup')} className={`${BTN} bg-white text-black`}>New Vault</button>
                            </div>
                        ) : (
                            <form onSubmit={(e) => handleEntry(e, view === 'setup' ? 'create' : 'login')}>
                                <input className="w-full border-[4px] border-black p-4 font-bold uppercase mb-4 outline-none" placeholder="Alias" onChange={e => setForm({...form, name: e.target.value})} required />
                                <input type="password" className="w-full border-[4px] border-black p-4 font-bold uppercase mb-4 outline-none" placeholder="Key" onChange={e => setForm({...form, pass: e.target.value})} required />
                                <button type="submit" className={`${BTN} bg-[#2563eb] text-white`}>{loading ? '...' : 'Execute'}</button>
                                <button type="button" onClick={() => setView('home')} className="text-xs font-black uppercase underline mt-4">Back</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #0c0c0c; color: #cccccc; margin: 0; }
        .win-blur { background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); }
        .win-border { border: 1px solid #3e3e3e; }
        .win-btn { background: #2b2b2b; border: 1px solid #3e3e3e; transition: all 0.2s; }
        .win-btn:hover { background: #353535; border-color: #0078d4; }
        .win-input { background: #1e1e1e; border: 1px solid #3e3e3e; border-bottom: 2px solid #3e3e3e; transition: border-color 0.2s; color: white; }
        .win-input:focus { border-bottom-color: #0078d4; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // replace these with your actual keys
        const SUPABASE_URL = 'https://jkqayyoyrzmrscqjkeqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcWF5eW95cnptcnNjcWprZXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTE3MjYsImV4cCI6MjA5MzE4NzcyNn0.IEsgMQsD5Sq4heWsmafHowKLh1KfXU___DcPBDATv38';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [vault, setVault] = useState(null);
            const [files, setFiles] = useState([]);
            const [form, setForm] = useState({ name: '', pass: '' });

            const getHash = async (text) => {
                const msgUint8 = new TextEncoder().encode(text.toLowerCase().trim());
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            };

            const refreshFiles = async (id) => {
                const { data } = await supabaseClient.storage.from('vaults').list(id);
                setFiles(data || []);
            };

            const handleEntry = async (e, mode) => {
                e.preventDefault();
                setLoading(true);
                const id = await getHash(form.name);
                const pHash = await getHash(form.pass);

                if (mode === 'create') {
                    const { error } = await supabaseClient.from('folders').insert([{ folder_hash: id, display_name: form.name, password_hash: pHash }]);
                    if (error) { alert("Vault name taken or error occurred."); setLoading(false); return; }
                } else {
                    const { data } = await supabaseClient.from('folders').select('*').eq('folder_hash', id).maybeSingle();
                    if (!data || data.password_hash !== pHash) { alert("Incorrect vault name or password."); setLoading(false); return; }
                }
                setVault({ id, name: form.name });
                refreshFiles(id);
                setView('inside');
                setLoading(false);
            };

            const uploadFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                await supabaseClient.storage.from('vaults').upload(`${vault.id}/${file.name}`, file);
                await refreshFiles(vault.id);
                setLoading(false);
            };

            const deleteFile = async (fileName) => {
                if (!confirm(`Delete "${fileName}"?`)) return;
                setLoading(true);
                await supabaseClient.storage.from('vaults').remove([`${vault.id}/${fileName}`]);
                await refreshFiles(vault.id);
                setLoading(false);
            };

            const deleteVault = async () => {
                const check = prompt(`To delete this vault, type the vault name ("${vault.name}") below:`);
                if (check !== vault.name) return;

                setLoading(true);
                // delete from db
                await supabaseClient.from('folders').delete().eq('folder_hash', vault.id);
                // clear storage
                if (files.length > 0) {
                    const paths = files.map(f => `${vault.id}/${f.name}`);
                    await supabaseClient.storage.from('vaults').remove(paths);
                }
                window.location.reload();
            };

            if (view === 'inside') return (
                <div className="min-h-screen p-6 md:p-12">
                    <div className="max-w-4xl mx-auto">
                        <header className="win-blur win-border p-6 mb-8 flex justify-between items-center">
                            <div>
                                <h2 className="text-white font-bold text-xl">{vault.name}</h2>
                                <p className="text-[10px] opacity-50 uppercase tracking-widest mt-1">Status: Secured</p>
                            </div>
                            <div className="flex gap-2">
                                <label className="win-btn px-4 py-2 text-xs font-bold cursor-pointer flex items-center gap-2">
                                    <i data-lucide="upload" size="14"></i> Upload
                                    <input type="file" className="hidden" onChange={uploadFile} />
                                </label>
                                <button onClick={deleteVault} className="win-btn px-4 py-2 text-xs font-bold text-red-400 hover:border-red-500">Delete Vault</button>
                                <button onClick={() => window.location.reload()} className="win-btn px-4 py-2 text-xs font-bold">Log Out</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {files.map(f => (
                                <div key={f.name} className="win-blur win-border p-4 flex items-center justify-between group">
                                    <div className="flex items-center gap-3 overflow-hidden">
                                        <i data-lucide="file" size="18" className="text-[#0078d4] shrink-0"></i>
                                        <span className="text-sm truncate">{f.name}</span>
                                    </div>
                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <a href={`${SUPABASE_URL}/storage/v1/object/public/vaults/${vault.id}/${f.name}`} download className="p-1 hover:text-white">
                                            <i data-lucide="download" size="18"></i>
                                        </a>
                                        <button onClick={() => deleteFile(f.name)} className="p-1 hover:text-red-500">
                                            <i data-lucide="trash-2" size="18"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#050505]">
                    <div className="win-blur win-border p-10 w-full max-w-sm">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-[#0078d4] flex items-center justify-center">
                                <i data-lucide="lock" className="text-white" size="20"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-white tracking-tight">OpenVault</h1>
                        </div>

                        {view === 'home' ? (
                            <div className="space-y-4">
                                <button onClick={() => setView('login')} className="win-btn w-full p-4 text-sm text-white font-bold">Log In</button>
                                <button onClick={() => setView('setup')} className="win-btn w-full p-4 text-sm opacity-60">Create New Vault</button>
                            </div>
                        ) : (
                            <form onSubmit={(e) => handleEntry(e, view === 'setup' ? 'create' : 'login')} className="space-y-5">
                                <div>
                                    <label className="text-[10px] uppercase opacity-50 block mb-1">Vault Name</label>
                                    <input className="win-input w-full p-3 text-sm" placeholder="Enter name" onChange={e => setForm({...form, name: e.target.value})} required />
                                </div>
                                <div>
                                    <label className="text-[10px] uppercase opacity-50 block mb-1">Password</label>
                                    <input type="password" className="win-input w-full p-3 text-sm" placeholder="••••••••" onChange={e => setForm({...form, pass: e.target.value})} required />
                                </div>
                                <button type="submit" className="win-btn w-full p-4 text-sm text-white bg-[#0078d4] border-none font-bold">
                                    {loading ? 'Working...' : (view === 'setup' ? 'Create' : 'Log In')}
                                </button>
                                <button type="button" onClick={() => setView('home')} className="w-full text-[10px] uppercase opacity-40 hover:opacity-100 transition-opacity">Go Back</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 1000); // keep icons fresh
    </script>
</body>
</html>
